<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!--
    viewport-fit=cover: fa sì che il contenuto occupi tutta la
    finestra iPhone, incluse le aree delle tacche (notch) e del
    home indicator. Le safe-area-inset le gestiamo noi via CSS.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Obbligatorio per la modalità fullscreen da Home Screen su iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!--
    black-translucent: la status bar diventa trasparente e il
    contenuto scorre dietro di essa (usiamo il padding-top safe-area).
    Se preferisci la status bar scura opaca, usa "black".
  -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Liturgia">

  <!-- Icona per il bottone "Aggiungi a Home Screen" di Safari -->
  <!-- Crea un file icon.png 192×192 px e mettilo nella stessa cartella -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <title>Liturgia del Giorno</title>

  <style>
    /* ─────────────────────────────────────────────────
       VARIABILI TEMA
       Pergamena calda per la luce, notte sepia per il buio.
       Il --accent è il bordeaux tradizionale dei libri liturgici.
    ───────────────────────────────────────────────── */
    :root {
      --bg:       #faf8f3;
      --surface:  #f2ede2;
      --text:     #22190d;
      --muted:    #8a7d68;
      --accent:   #6b3416;
      --rubric:   #8b1a1a;   /* rosso rubrica tradizionale */
      --border:   #ddd5c5;
      --tab-bg:   rgba(250, 248, 243, 0.94);
      /* iOS safe areas: evitano sovrapposizioni con notch e home bar */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #181410;
        --surface: #221d15;
        --text:    #ede4d0;
        --muted:   #9a8c76;
        --accent:  #c87840;
        --rubric:  #d96060;
        --border:  #332b1e;
        --tab-bg:  rgba(24, 20, 16, 0.96);
      }
    }

    /* ─────────────────────────────────────────────────
       RESET E BASE
    ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      overflow: hidden;          /* l'unico scroll è quello interno a #scroll-area */
      background: var(--bg);
      color: var(--text);
      /* -webkit-text-size-adjust evita che iOS ingrandisca automaticamente
         il testo quando il viewport ruota */
      -webkit-text-size-adjust: 100%;
    }

    /* ─────────────────────────────────────────────────
       LAYOUT PRINCIPALE
       Flex verticale: header fisso in cima, area di scroll
       al centro, tab bar fissa in fondo.
    ───────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      /* Padding per la status bar iOS (tacca superiore) */
      padding-top: var(--safe-top);
    }

    /* ─────────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    #header-date {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      margin-bottom: 3px;
    }
    #header-title {
      font-size: 22px;
      font-weight: 700;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    /* ─────────────────────────────────────────────────
       AREA DI SCORRIMENTO
    ───────────────────────────────────────────────── */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* scroll momentum su iOS */
      /* Padding inferiore: altezza tab bar + safe area + margine */
      padding: 28px 20px calc(64px + var(--safe-bot) + 20px);
    }

    /* ─────────────────────────────────────────────────
       STATO: CARICAMENTO
    ───────────────────────────────────────────────── */
    #state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
      color: var(--muted);
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      gap: 16px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────────────
       STATO: ERRORE
    ───────────────────────────────────────────────── */
    #state-error {
      display: none;
      padding: 22px;
      border: 1px solid var(--rubric);
      border-radius: 12px;
      background: var(--surface);
      color: var(--rubric);
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.75;
    }
    #state-error a {
      color: var(--accent);
      text-decoration: underline;
    }
    #state-error strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    /* ─────────────────────────────────────────────────
       CONTENUTO LITURGICO
       Tipografia ottimizzata per la lettura spirituale
       su schermo piccolo.
    ───────────────────────────────────────────────── */
    #liturgy {
      display: none;
      max-width: 620px;
      margin: 0 auto;
    }

    /* Tutti gli elementi ereditano il font serif dal contenitore */
    #liturgy * {
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Testo principale dei salmi, letture, inni */
    #liturgy p {
      font-size: 17.5px;
      line-height: 1.95;
      margin-bottom: 6px;
      color: var(--text);
    }

    /* Titolo h1 dell'ora (Vespri, Messa, ecc.): già nell'header, lo nascondiamo */
    #liturgy h1 {
      display: none;
    }

    /* h2/h3/h4: titoli di sezione (INNO, SALMO, CANTICO...) */
    #liturgy h2, #liturgy h3, #liturgy h4 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: -apple-system, sans-serif;
      margin: 28px 0 10px;
    }

    /* Separatore orizzontale tra prima e seconda lettura */
    #liturgy hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Citazioni bibliche di riferimento (Es. "Eb 3, 13") */
    #liturgy em {
      color: var(--muted);
      font-style: italic;
      font-size: 15px;
    }

    /* Rubrica liturgica: V. R. Ant.
       Aggiunte via JS dopo il rendering, per colorarle di rosso. */
    #liturgy p.rubric {
      color: var(--rubric);
      font-weight: 600;
      font-size: 14.5px;
      margin-top: 14px;
      margin-bottom: 1px;
    }

    /* Sottotitolo liturgico (es. "VII SETTIMANA DI PASQUA")
       che appare come primo paragrafo visibile dopo h1 */
    #liturgy p.liturgy-subtitle {
      font-size: 10.5px;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      font-weight: 500;
    }

    /* Intestazione delle sezioni PRIMA / SECONDA LETTURA */
    #liturgy .lettura-section > *:first-child {
      display: block;
      font-size: 10.5px;
      font-family: -apple-system, sans-serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--rubric);
      font-weight: 700;
      margin-bottom: 18px;
      /* Usa style serif anche per la label */
      font-style: normal;
    }

    /* ─────────────────────────────────────────────────
       TAB BAR iOS
       Backdrop blur per l'effetto frosted-glass tipico di iOS.
    ───────────────────────────────────────────────── */
    #tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(56px + var(--safe-bot));
      padding-bottom: var(--safe-bot);
      background: var(--tab-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding-top: 6px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      /* Rimuove il flash blu al tap su iOS Safari */
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s ease;
      user-select: none;
    }
    .tab.active {
      color: var(--accent);
    }
    .tab-icon {
      font-size: 22px;
      line-height: 1;
    }
    .tab-label {
      font-size: 10px;
      letter-spacing: 0.1px;
      font-weight: 500;
    }
  </style>
</head>

<body>
<div id="app">

  <header id="header">
    <div id="header-date">—</div>
    <div id="header-title">Liturgia del Giorno</div>
  </header>

  <main id="scroll-area">
    <div id="state-loading">
      <div class="spinner"></div>
      Caricamento testo liturgico…
    </div>
    <div id="state-error"></div>
    <div id="liturgy"></div>
  </main>

  <nav id="tab-bar">
    <button class="tab" data-tab="vespri">
      <span class="tab-icon">🕯️</span>
      <span class="tab-label">Vespri</span>
    </button>
    <button class="tab" data-tab="messa">
      <span class="tab-icon">✝️</span>
      <span class="tab-label">Messa</span>
    </button>
    <button class="tab" data-tab="ufficio">
      <span class="tab-icon">📖</span>
      <span class="tab-label">Letture</span>
    </button>
  </nav>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURAZIONE — sostituisci PROXY con il tuo Cloudflare Worker
   se lo hai già deployato; altrimenti corsproxy.io funziona subito.
   ═══════════════════════════════════════════════════════════════ */

const PROXY = 'https://corsproxy.io/?url=';
// const PROXY = 'https://IL-TUO-WORKER.workers.dev/?url=';

const CEI_BASE = 'https://www.chiesacattolica.it';

/* ═══════════════════════════════════════════════════════════════
   STATO APPLICAZIONE
   ═══════════════════════════════════════════════════════════════ */
let activeTab = null;
const memCache = {};  // Cache in memoria per la sessione corrente

/* ═══════════════════════════════════════════════════════════════
   UTILITÀ DATA
   ═══════════════════════════════════════════════════════════════

   Usiamo Intl.DateTimeFormat con timeZone 'Europe/Rome' per essere
   certi di usare la data liturgica corretta anche se l'iPhone è
   fisicamente in un altro fuso orario.
   ═══════════════════════════════════════════════════════════════ */
function getDateStr() {
  const parts = new Intl.DateTimeFormat('it-IT', {
    timeZone: 'Europe/Rome',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).formatToParts(new Date());
  const v = k => parts.find(p => p.type === k).value;
  return `${v('year')}${v('month')}${v('day')}`;
}

function formatDateLabel(ds) {
  // ds è nel formato YYYYMMDD
  const iso = `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}T12:00:00`;
  return new Date(iso).toLocaleDateString('it-IT', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

/* ═══════════════════════════════════════════════════════════════
   URL BUILDER
   ═══════════════════════════════════════════════════════════════

   Gli URL sono completamente deterministici dalla data.
   Non è necessario fare scraping della homepage per trovare i link.
   Il parametro ?data-liturgia=YYYYMMDD è stabile da anni.
   ═══════════════════════════════════════════════════════════════ */
function buildUrl(tab, ds) {
  switch (tab) {
    case 'messa':
      return `${CEI_BASE}/liturgia-del-giorno/?data-liturgia=${ds}`;
    case 'vespri':
      return `${CEI_BASE}/la-liturgia-delle-ore/?data-liturgia=${ds}&ora=vespri`;
    case 'ufficio':
      return `${CEI_BASE}/la-liturgia-delle-ore/?data-liturgia=${ds}&ora=ufficio-delle-letture`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   FETCH CON CACHE A DUE LIVELLI
   ═══════════════════════════════════════════════════════════════

   1° livello: cache in memoria (velocissima, dura la sessione)
   2° livello: localStorage con chiave {tab}_{YYYYMMDD}

   Le voci di giorni precedenti vengono cancellate automaticamente
   al primo accesso del giorno nuovo, così lo storage non si riempie.
   ═══════════════════════════════════════════════════════════════ */
async function fetchPage(tab, ds) {
  const key = `${tab}_${ds}`;

  // Cache memoria
  if (memCache[key]) return memCache[key];

  // Cache localStorage
  const stored = localStorage.getItem(key);
  if (stored) {
    memCache[key] = stored;
    return stored;
  }

  // Pulizia chiavi di giorni precedenti (mantieni solo oggi)
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && !k.endsWith(`_${ds}`)) localStorage.removeItem(k);
  }

  // Fetch reale tramite proxy CORS
  const url = buildUrl(tab, ds);
  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error(`Risposta HTTP ${res.status} dal server`);

  const html = await res.text();

  // Salva in entrambe le cache
  memCache[key] = html;
  try { localStorage.setItem(key, html); } catch (_) {
    // localStorage pieno o non disponibile: prosegui senza cache persistente
  }

  return html;
}

/* ═══════════════════════════════════════════════════════════════
   HELPER: trova il figlio diretto di container che contiene el
   ═══════════════════════════════════════════════════════════════ */
function topChild(el, container) {
  let curr = el;
  while (curr && curr.parentElement !== container) curr = curr.parentElement;
  return (curr && curr.parentElement === container) ? curr : null;
}

/* ═══════════════════════════════════════════════════════════════
   ESTRAZIONE PRIMARIA: H1-BOUNDARY
   ═══════════════════════════════════════════════════════════════

   Perché questa strategia è più robusta del selettore CSS:
   - I nomi delle classi CSS (es. .entry-content) possono cambiare
     con un aggiornamento del tema WordPress senza preavviso.
   - Il titolo liturgico dell'ora (h1 "Vespri", "Messa del Giorno",
     "Ufficio delle letture") è contenuto stabile: cambierebbe solo
     se il sito CEI cambia la struttura del testo liturgico stesso.

   La funzione:
   1. Trova l'h1 con il titolo atteso per il tab corrente
   2. Clona l'h1 e tutti i suoi fratelli successivi (nextElementSibling)
      — questo cattura tutto il testo liturgico escludendo la
      navigazione e il breadcrumb che stanno PRIMA dell'h1
   3. Si ferma quando incontra: la sezione "Condividi" (social sharing),
      "Memoria principale/facoltativa" (seconda opzione della Messa),
      o il footer della pagina
   ═══════════════════════════════════════════════════════════════ */

// Titoli h1 attesi per ogni tab. L'ordine conta: il primo match vince.
const H1_TITLES = {
  vespri:  ['Vespri'],
  messa:   ['Messa del Giorno', 'Messa del giorno'],
  ufficio: ['Ufficio delle letture', 'Ufficio delle Letture']
};

function extractFromH1(doc, tab) {
  const titles = H1_TITLES[tab] || [];

  // Trova l'h1 che corrisponde esattamente a uno dei titoli attesi
  const h1 = Array.from(doc.querySelectorAll('h1')).find(el =>
    titles.some(t => el.textContent.trim() === t ||
                     el.textContent.trim().toLowerCase() === t.toLowerCase())
  );
  if (!h1) return null;

  // Decide quando fermare la raccolta dei fratelli
  function isStopEl(el) {
    const text = (el.textContent || '').trim();
    const tag  = el.tagName || '';
    return (
      text === 'Condividi' ||
      /^Memoria (principale|facoltativa)/i.test(text) ||
      tag === 'FOOTER' ||
      (typeof el.id === 'string' && el.id.toLowerCase() === 'footer') ||
      (typeof el.className === 'string' && /\bfooter\b/.test(el.className))
    );
  }

  const result = document.createElement('div');
  result.appendChild(h1.cloneNode(true)); // includi l'h1 stesso

  let curr = h1.nextElementSibling;
  let count = 0;
  while (curr) {
    if (isStopEl(curr)) break;
    result.appendChild(curr.cloneNode(true));
    curr = curr.nextElementSibling;
    count++;
  }

  // Se l'h1 è annidato in un div (ha pochissimi o zero fratelli),
  // risaliamo di un livello e ripetiamo la raccolta dal genitore.
  if (count < 3 && result.textContent.trim().length < 400) {
    const parent = h1.parentElement;
    if (parent && parent.tagName !== 'BODY') {
      const fallbackResult = document.createElement('div');
      let c = parent;
      while (c) {
        if (isStopEl(c)) break;
        fallbackResult.appendChild(c.cloneNode(true));
        c = c.nextElementSibling;
      }
      if (fallbackResult.textContent.trim().length > result.textContent.trim().length)
        return fallbackResult;
    }
  }

  return result;
}

/* ═══════════════════════════════════════════════════════════════
   FALLBACK CSS: usato solo se extractFromH1 fallisce
   ═══════════════════════════════════════════════════════════════ */
function findContentEl(doc) {
  const selectors = [
    '.entry-content', '.post-entry', '.post-content',
    '.page-content',  '.single-content', 'main article', 'article', 'main'
  ];
  for (const s of selectors) {
    const el = doc.querySelector(s);
    if (el && el.textContent.trim().length > 300) return el;
  }
  return doc.body;
}

/* ═══════════════════════════════════════════════════════════════
   PULIZIA ELEMENTI NON TESTUALI
   ═══════════════════════════════════════════════════════════════

   NOTA: non rimuoviamo nav/header/footer/aside per selettore tag,
   perché extractFromH1 esclude già a monte tutto ciò che precede
   l'h1 (navigazione, breadcrumb). Rimuoverli qui causerebbe falsi
   positivi se il sito CEI usasse quei tag per wrappare contenuto
   liturgico legittimo.
   ═══════════════════════════════════════════════════════════════ */
function cleanEl(el) {
  const cssToRemove = [
    'img', 'figure', 'picture', 'video', 'iframe', 'script', 'style', 'noscript',
    '[class*="share"]', '[class*="social"]', '[class*="grandezza"]',
    '.addtoany_share_save_container', '.a2a_kit', '.wp-block-buttons',
    'a[href*="facebook"]', 'a[href*="twitter"]', 'a[href*="mailto"]',
    'a[href="#"]', '.breadcrumb', '.breadcrumbs'
  ];
  cssToRemove.forEach(s => {
    try { el.querySelectorAll(s).forEach(e => e.remove()); } catch(_) {}
  });

  // Rimozione per testo esatto: bottoni e label UI non liturgici
  const skipTexts = [
    'Grandezza Testo', 'Condividi', 'Invia', 'Stampa',
    'Facebook', 'Twitter', 'Torna ai risultati',
    'Lettura a schermo intero', 'Chiudi mappa', 'Home'
  ];
  Array.from(el.querySelectorAll('p, div, span, a, li, button'))
    .reverse()
    .forEach(e => {
      const t = e.textContent.trim();
      if (skipTexts.some(u => t === u) || /^A\s+A\s+A$/.test(t)) e.remove();
    });
}

/* ═══════════════════════════════════════════════════════════════
   RIMOZIONE ALTERNATIVE (Oppure:)
   ═══════════════════════════════════════════════════════════════

   Versione corretta rispetto alla precedente.

   Il bug precedente: nextSectionPat conteneva solo pattern testuali
   tipici della Liturgia delle Ore ("1 ant.", "SALMO", ecc.) e non
   conosceva le sezioni della Messa ("Vangelo", "Sulle offerte",
   "Dopo la comunione"). Di conseguenza, quando incontrava "Oppure:"
   nel Salmo Responsoriale della Messa, rimuoveva tutto fino alla
   fine della pagina — lasciando solo la data prima dell'h1.

   La correzione: si ferma al primo ELEMENTO HEADING (h2, h3, h4, h5)
   incontrato dopo "Oppure:". Questo funziona per entrambe le strutture:
   - Messa del Giorno: le sezioni sono in h2/h3 → stop immediato
   - Liturgia delle Ore: le sezioni sono in testo piano → si usa
     textSectionPat come secondo criterio di stop
   ═══════════════════════════════════════════════════════════════ */
function removeAlternatives(el) {
  // Pattern testuali per sezioni della Liturgia delle Ore
  const textSectionPat = /^(\d+\s*ant\.|SALMO\b|CANTICO\b|INNO\b|ANT\.|Ant\.|PRIMA\s+LETTURA|SECONDA\s+LETTURA|RESPONSORIO|ORAZIONE\b)/i;

  // Trova tutti gli elementi foglia con testo esattamente "Oppure:" o "Oppure"
  // (children.length === 0 = nessun elemento figlio = è un nodo foglia)
  const oppureEls = Array.from(el.querySelectorAll('*'))
    .filter(e => {
      const t = e.textContent.trim();
      return (t === 'Oppure:' || t === 'Oppure') && e.children.length === 0;
    })
    .reverse(); // dal fondo per non invalidare i riferimenti DOM

  for (const leaf of oppureEls) {
    const top = topChild(leaf, el);
    if (!top) continue;

    const toRemove = [top];
    let sib = top.nextElementSibling;

    while (sib) {
      // STOP CRITERIO 1: heading HTML (h2, h3, h4, h5)
      // Gestisce la struttura della Messa del Giorno, dove ogni sezione
      // (Antifona, Colletta, Vangelo, ecc.) è avvolta in un h2/h3.
      if (/^H[2-5]$/.test(sib.tagName)) break;

      // STOP CRITERIO 2: pattern testuale della Liturgia delle Ore
      // Gestisce sezioni come "1 ant.", "SALMO", "Ant.", ecc.
      const t = (sib.textContent || '').trim();
      if (textSectionPat.test(t)) break;

      toRemove.push(sib);
      sib = sib.nextElementSibling;
    }

    toRemove.forEach(n => n.remove());
  }
}

/* ═══════════════════════════════════════════════════════════════
   RIMOZIONE SECONDA OPZIONE (Messa del Giorno)
   ═══════════════════════════════════════════════════════════════

   La pagina Messa del Giorno può includere più opzioni celebrative:
   prima la Messa del giorno feriale/festivo, poi le Memorie
   facoltative dei santi. Mostriamo solo la prima opzione.

   Le Memorie facoltative sono segnalate da un heading h3/h4
   contenente "MEMORIA FACOLTATIVA" o "MEMORIA PRINCIPALE".
   Tutto da quel punto in poi viene rimosso.

   Poiché extractFromH1 restituisce un div con tutti i figli
   come FIGLI DIRETTI (non annidati), possiamo usare l'iterazione
   sui childNodes diretti — molto più semplice e affidabile.
   ═══════════════════════════════════════════════════════════════ */
function removeSecondMassOption(el) {
  let removing = false;
  Array.from(el.children).forEach(child => {
    if (removing) { child.remove(); return; }
    if (
      /^H[2-5]$/.test(child.tagName) &&
      /MEMORIA\s+(FACOLTATIVA|PRINCIPALE)/i.test(child.textContent.trim())
    ) {
      removing = true;
      child.remove();
    }
  });
}

/* ═══════════════════════════════════════════════════════════════
   ESTRAZIONE PRIMA E SECONDA LETTURA (Ufficio delle letture)
   ═══════════════════════════════════════════════════════════════ */
function extractLetture(contentEl) {
  // Cerca un elemento foglia (nessun figlio, testo breve) che corrisponde
  // al titolo della lettura. Il testo < 80 char esclude elementi che
  // contengono più di una riga (es. paragrafi del testo biblico).
  function findLeaf(pattern) {
    return Array.from(contentEl.querySelectorAll('*')).find(e =>
      e.children.length === 0 &&
      e.textContent.trim().length < 80 &&
      pattern.test(e.textContent.trim())
    );
  }

  const primaLeaf   = findLeaf(/PRIMA\s+LETTURA/i);
  const secondaLeaf = findLeaf(/SECONDA\s+LETTURA/i);

  // Se non troviamo i marcatori → fallback: mostra tutto il contenuto
  if (!primaLeaf && !secondaLeaf) return contentEl;

  const primaTop  = primaLeaf  ? topChild(primaLeaf,  contentEl) : null;
  const secondaTop = secondaLeaf ? topChild(secondaLeaf, contentEl) : null;

  // Pattern che segnalano la fine della Seconda Lettura
  const endPat = /^(TE\s+DEUM|BREVE\s+RESPONSORIO|RESPONSORIO\b|ORAZIONE\b|CONCLUSIONE|LAUDI)/i;

  const result  = document.createElement('div');
  let mode      = null;
  let section   = null;

  for (const child of Array.from(contentEl.childNodes)) {
    const isOrContains = (leaf, top) =>
      leaf && top &&
      (child === top || (typeof child.contains === 'function' && child.contains(leaf)));

    if (isOrContains(primaLeaf, primaTop)) {
      mode = 'prima';
      section = document.createElement('div');
      section.className = 'lettura-section';
      result.appendChild(section);
      if (child.nodeType === Node.ELEMENT_NODE) section.appendChild(child.cloneNode(true));
      continue;
    }
    if (isOrContains(secondaLeaf, secondaTop)) {
      result.appendChild(document.createElement('hr'));
      mode = 'seconda';
      section = document.createElement('div');
      section.className = 'lettura-section';
      result.appendChild(section);
      if (child.nodeType === Node.ELEMENT_NODE) section.appendChild(child.cloneNode(true));
      continue;
    }
    if (mode === 'seconda' && child.nodeType === Node.ELEMENT_NODE) {
      if (endPat.test((child.textContent || '').trim())) break;
    }
    if (mode && section) {
      if (child.nodeType === Node.ELEMENT_NODE ||
         (child.nodeType === Node.TEXT_NODE && child.textContent.trim())) {
        section.appendChild(child.cloneNode(true));
      }
    }
  }

  return result.childElementCount > 0 ? result : contentEl;
}

/* ═══════════════════════════════════════════════════════════════
   STILI SEMANTICI POST-RENDERING
   ═══════════════════════════════════════════════════════════════ */
function applySemanticStyles(container) {
  // Rubrica (V. R. Ant.): colore rosso tradizionale
  const rubricPat = /^(V\.|R\.|Ant\.|Sal\.|Rit\.)$/;
  container.querySelectorAll('p').forEach(p => {
    if (rubricPat.test(p.textContent.trim())) p.classList.add('rubric');
  });

  // Sottotitolo liturgico (settimana, solennità, ecc.): testo piccolo maiuscolo
  const firstP = container.querySelector('p:not(.rubric)');
  if (firstP) {
    const t = firstP.textContent.trim();
    if (t.length < 120 && /SETTIMANA|SOLENNIT|DOMENICA|FESTA|VENERD|LUNED|MARTED|MERCOLED|GIOVED|SABATO/i.test(t))
      firstP.classList.add('liturgy-subtitle');
  }
}

/* ═══════════════════════════════════════════════════════════════
   PIPELINE DI ESTRAZIONE COMPLETA
   ═══════════════════════════════════════════════════════════════ */
function extractContent(rawHtml, tab) {
  const doc = new DOMParser().parseFromString(rawHtml, 'text/html');

  // 1. Estrazione primaria via H1-boundary (più robusta)
  let content = extractFromH1(doc, tab);

  // 2. Fallback CSS se l'h1 non è stato trovato o il risultato è scarso
  if (!content || content.textContent.trim().length < 200) {
    const fallback = findContentEl(doc);
    content = document.createElement('div');
    // cloneNode garantisce che lavoriamo su un sottoalbero isolato
    Array.from(fallback.childNodes).forEach(n => content.appendChild(n.cloneNode(true)));
  }

  // 3. Pulizia elementi di UI non liturgici
  cleanEl(content);

  // 4. Rimozione sezioni alternative (Oppure:) — tutti i tab
  removeAlternatives(content);

  // 5. Lavorazione specifica per tab
  if (tab === 'messa')   removeSecondMassOption(content);
  if (tab === 'ufficio') return extractLetture(content);

  return content;
}

/* ═══════════════════════════════════════════════════════════════
   GESTIONE UI
   ═══════════════════════════════════════════════════════════════ */
const elLoading = document.getElementById('state-loading');
const elError   = document.getElementById('state-error');
const elLiturgy = document.getElementById('liturgy');
const elDate    = document.getElementById('header-date');
const elTitle   = document.getElementById('header-title');

function showLoading() {
  elLoading.style.display = '';
  elError.style.display   = 'none';
  elLiturgy.style.display = 'none';
}

function showContent(node) {
  elLoading.style.display = 'none';
  elError.style.display   = 'none';
  elLiturgy.innerHTML     = '';

  if (typeof node === 'string') {
    elLiturgy.innerHTML = node;
  } else {
    elLiturgy.appendChild(node);
  }

  // Applica stili semantici dopo l'inserimento nel DOM
  applySemanticStyles(elLiturgy);

  // FIX: usare 'block' e non '' — impostare '' rimuove lo stile inline
  // e cede il controllo al CSS, che ha display:none su #liturgy.
  elLiturgy.style.display = 'block';

  // Torna in cima alla pagina ad ogni cambio di tab
  document.getElementById('scroll-area').scrollTop = 0;
}

function showError(msg, url) {
  elLoading.style.display = 'none';
  elLiturgy.style.display = 'none';
  elError.innerHTML = `
    <strong>Errore nel caricamento</strong>
    ${msg}
    <br><br>
    <a href="${url}" target="_blank" rel="noopener noreferrer">Apri il sito originale →</a>
  `;
  // FIX: stesso motivo — 'block' esplicito, non '' che lascerebbe
  // il controllo al CSS (display:none su #state-error).
  elError.style.display = 'block';
}

/* ═══════════════════════════════════════════════════════════════
   TITOLI DEI TAB
   ═══════════════════════════════════════════════════════════════ */
const TAB_TITLES = {
  vespri:  'Vespri',
  messa:   'Messa del Giorno',
  ufficio: "Letture dell'Ufficio"
};

/* ═══════════════════════════════════════════════════════════════
   RENDER PRINCIPALE
   ═══════════════════════════════════════════════════════════════ */
async function renderTab(tab) {
  showLoading();
  elTitle.textContent = TAB_TITLES[tab];

  const ds = getDateStr();
  elDate.textContent = formatDateLabel(ds);

  try {
    const rawHtml = await fetchPage(tab, ds);
    const contentNode = extractContent(rawHtml, tab);
    showContent(contentNode);
  } catch (err) {
    showError(err.message, buildUrl(tab, ds));
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGAZIONE TRA TAB
   ═══════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  if (tab === activeTab) return; // già attivo, nessuna azione
  activeTab = tab;

  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });

  renderTab(tab);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

/* ═══════════════════════════════════════════════════════════════
   AVVIO
   Mostra i Vespri come schermata iniziale predefinita.
   ═══════════════════════════════════════════════════════════════ */
switchTab('vespri');
</script>
