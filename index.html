    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #FDF8F2;
      --surface:   #FFFFFF;
      --text:      #2C1B0E;
      --sub:       #7A6550;
      --accent:    #8B5E3C;
      --gold:      #A87028;
      --rule:      #E8DDD0;
      --shadow:    0 2px 12px rgba(44, 27, 14, 0.08);
      --radius:    16px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #1A1208;
        --surface: #261B0F;
        --text:    #F0E8DC;
        --sub:     #A89070;
        --accent:  #C8905A;
        --gold:    #D4A050;
        --rule:    #3A2A18;
        --shadow:  0 2px 12px rgba(0,0,0,0.4);
      }
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top, 0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      padding: 14px 20px 10px;
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .header-date {
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 2px;
    }
    .header-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      line-height: 1.1;
    }
    .header-author {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    /* ── Chapter bar ── */
    .chapter-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--rule);
    }
    .chapter-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }
    .day-badge {
      font-size: 12px;
      color: var(--sub);
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 20px;
      padding: 3px 10px;
    }

    /* ── Points ── */
    .points-list {
      flex: 1;
      padding: 16px 16px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .point-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      border: 1px solid var(--rule);
    }

    .point-number {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .point-text {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-line;
      font-weight: 400;
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--rule) 25%, var(--bg) 50%, var(--rule) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
      margin-bottom: 8px;
    }
    .skeleton.w80 { width: 80%; }
    .skeleton.w60 { width: 60%; }
    .skeleton.w90 { width: 90%; }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Error state */
    .error-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--rule);
      padding: 24px 20px;
      text-align: center;
    }
    .error-icon { font-size: 36px; margin-bottom: 12px; }
    .error-msg  { font-size: 15px; color: var(--sub); margin-bottom: 16px; line-height: 1.5; }
    .retry-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Navigation bar ── */
    .nav-bar {
      position: sticky;
      bottom: 0;
      background: var(--bg);
      border-top: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px calc(10px + env(safe-area-inset-bottom, 0px));
    }
    .nav-btn {
      background: var(--surface);
      border: 1px solid var(--rule);
      border-radius: 12px;
      width: 44px; height: 44px;
      font-size: 18px;
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.15s;
    }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn:active:not(:disabled) { opacity: 0.6; }
    .nav-center {
      text-align: center;
      flex: 1;
      padding: 0 8px;
    }
    .nav-day {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .nav-cycle {
      font-size: 11px;
      color: var(--sub);
      margin-top: 1px;
    }
    .today-btn {
      font-size: 12px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: 2px;
      padding: 0;
      display: none;
      -webkit-tap-highlight-color: transparent;
    }
    .today-btn.visible { display: block; }
  </style>
</head>

// ── Stato dell'app ─────────────────────────────────────────
let navOffset = 0; // offset rispetto a oggi (+/- giorni)

// ── Calcolo del giorno ─────────────────────────────────────
function getDayIndex(offset) {
  const today    = new Date();
  const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  const anchMid  = new Date(ANCHOR_DATE.getFullYear(), ANCHOR_DATE.getMonth(), ANCHOR_DATE.getDate());
  const elapsed  = Math.round((todayMid - anchMid) / 86400000) + offset;
  const idx      = ((elapsed % TOTAL_DAYS) + TOTAL_DAYS) % TOTAL_DAYS;
  const cycle    = Math.floor((elapsed < 0 ? elapsed : elapsed) / TOTAL_DAYS) + 1;
  return { idx, elapsed, cycleDay: idx + 1, cycle: Math.max(1, cycle) };
}

// ── Aggiornamento UI ───────────────────────────────────────
function updateHeader(offset) {
  const d    = new Date();
  d.setDate(d.getDate() + offset);
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('header-date').textContent =
    d.toLocaleDateString('it-IT', opts);

  const { idx, cycleDay, cycle } = getDayIndex(offset);
  const entry = SCHEDULE[idx];

  document.getElementById('chapter-name').textContent = entry.c;
  document.getElementById('day-badge').textContent    =
    `Punti ${entry.p[0]}–${entry.p[entry.p.length-1]}`;

  document.getElementById('nav-day').textContent   = `Giorno ${cycleDay} di ${TOTAL_DAYS}`;
  document.getElementById('nav-cycle').textContent =
    cycle > 1 ? `Ciclo ${cycle} · Lettura completa` : 'Primo ciclo';

  const todayBtn = document.getElementById('today-btn');
  if (offset !== 0) todayBtn.classList.add('visible');
  else              todayBtn.classList.remove('visible');
}

// ── Skeleton loading ───────────────────────────────────────
function showLoading(count) {
  const list = document.getElementById('points-list');
  list.innerHTML = Array.from({length: count}, (_, i) => `
    <div class="point-card">
      <div class="skeleton w60" style="height:11px; margin-bottom:12px;"></div>
      <div class="skeleton w90"></div>
      <div class="skeleton w80"></div>
      <div class="skeleton" style="width:${50+i*7}%;"></div>
    </div>`).join('');
}

// ── Caricamento dei punti dal Worker ───────────────────────
async function load(offset) {
  const { idx } = getDayIndex(offset);
  const entry   = SCHEDULE[idx];

  updateHeader(offset);
  showLoading(entry.p.length);

  try {
    const pts = entry.p.join(',');
    const url = `${WORKER_URL}?slug=${encodeURIComponent(entry.s)}&pts=${pts}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Errore HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    renderPoints(data.points, entry);
  } catch(err) {
    renderError(err.message, offset);
  }
}

// ── Rendering dei punti ────────────────────────────────────
function renderPoints(points, entry) {
  const list = document.getElementById('points-list');

  if (!points || points.length === 0) {
    list.innerHTML = `<div class="error-card">
      <div class="error-icon">📖</div>
      <div class="error-msg">Nessun testo ricevuto.<br>Verifica che il Worker sia attivo.</div>
      <button class="retry-btn" onclick="load(${navOffset})">Riprova</button>
    </div>`;
    return;
  }

  list.innerHTML = points.map(pt => `
    <div class="point-card">
      <div class="point-number">Punto ${pt.num}</div>
      <div class="point-text">${escHtml(pt.text)}</div>
    </div>`).join('');
}

// ── Errore ─────────────────────────────────────────────────
function renderError(msg, offset) {
  const list = document.getElementById('points-list');
  list.innerHTML = `
    <div class="error-card">
      <div class="error-icon">⚠️</div>
      <div class="error-msg">Impossibile caricare i punti.<br>
        <small style="opacity:.7">${escHtml(msg)}</small></div>
      <button class="retry-btn" onclick="load(${offset})">Riprova</button>
    </div>`;
}

// ── Navigazione ────────────────────────────────────────────
function navigate(delta) {
  navOffset += delta;
  load(navOffset);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goToday() {
  navOffset = 0;
  load(0);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Utility ────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Avvio ──────────────────────────────────────────────────
load(0);
