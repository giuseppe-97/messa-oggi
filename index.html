<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <!--
    viewport-fit=cover: fa sì che il contenuto occupi tutta la
    finestra iPhone, incluse le aree delle tacche (notch) e del
    home indicator. Le safe-area-inset le gestiamo noi via CSS.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Obbligatorio per la modalità fullscreen da Home Screen su iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <!--
    black-translucent: la status bar diventa trasparente e il
    contenuto scorre dietro di essa (usiamo il padding-top safe-area).
    Se preferisci la status bar scura opaca, usa "black".
  -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Liturgia">

  <!-- Icona per il bottone "Aggiungi a Home Screen" di Safari -->
  <!-- Crea un file icon.png 192×192 px e mettilo nella stessa cartella -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <title>Liturgia del Giorno</title>

  <style>
    /* ─────────────────────────────────────────────────
       VARIABILI TEMA
       Pergamena calda per la luce, notte sepia per il buio.
       Il --accent è il bordeaux tradizionale dei libri liturgici.
    ───────────────────────────────────────────────── */
    :root {
      --bg:       #faf8f3;
      --surface:  #f2ede2;
      --text:     #22190d;
      --muted:    #8a7d68;
      --accent:   #6b3416;
      --rubric:   #8b1a1a;   /* rosso rubrica tradizionale */
      --border:   #ddd5c5;
      --tab-bg:   rgba(250, 248, 243, 0.94);
      /* iOS safe areas: evitano sovrapposizioni con notch e home bar */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #181410;
        --surface: #221d15;
        --text:    #ede4d0;
        --muted:   #9a8c76;
        --accent:  #c87840;
        --rubric:  #d96060;
        --border:  #332b1e;
        --tab-bg:  rgba(24, 20, 16, 0.96);
      }
    }

    /* ─────────────────────────────────────────────────
       RESET E BASE
    ───────────────────────────────────────────────── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%;
      overflow: hidden;          /* l'unico scroll è quello interno a #scroll-area */
      background: var(--bg);
      color: var(--text);
      /* -webkit-text-size-adjust evita che iOS ingrandisca automaticamente
         il testo quando il viewport ruota */
      -webkit-text-size-adjust: 100%;
    }

    /* ─────────────────────────────────────────────────
       LAYOUT PRINCIPALE
       Flex verticale: header fisso in cima, area di scroll
       al centro, tab bar fissa in fondo.
    ───────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      /* Padding per la status bar iOS (tacca superiore) */
      padding-top: var(--safe-top);
    }

    /* ─────────────────────────────────────────────────
       HEADER
    ───────────────────────────────────────────────── */
    #header {
      flex-shrink: 0;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    #header-date {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.7px;
      text-transform: uppercase;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      margin-bottom: 3px;
    }
    #header-title {
      font-size: 22px;
      font-weight: 700;
      font-family: Georgia, 'Times New Roman', serif;
      color: var(--accent);
      letter-spacing: -0.3px;
    }

    /* ─────────────────────────────────────────────────
       AREA DI SCORRIMENTO
    ───────────────────────────────────────────────── */
    #scroll-area {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch; /* scroll momentum su iOS */
      /* Padding inferiore: altezza tab bar + safe area + margine */
      padding: 28px 20px calc(64px + var(--safe-bot) + 20px);
    }

    /* ─────────────────────────────────────────────────
       STATO: CARICAMENTO
    ───────────────────────────────────────────────── */
    #state-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px;
      color: var(--muted);
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      gap: 16px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─────────────────────────────────────────────────
       STATO: ERRORE
    ───────────────────────────────────────────────── */
    #state-error {
      display: none;
      padding: 22px;
      border: 1px solid var(--rubric);
      border-radius: 12px;
      background: var(--surface);
      color: var(--rubric);
      font-family: -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.75;
    }
    #state-error a {
      color: var(--accent);
      text-decoration: underline;
    }
    #state-error strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    /* ─────────────────────────────────────────────────
       CONTENUTO LITURGICO
       Tipografia ottimizzata per la lettura spirituale
       su schermo piccolo.
    ───────────────────────────────────────────────── */
    #liturgy {
      display: none;
      max-width: 620px;
      margin: 0 auto;
    }

    /* Tutti gli elementi ereditano il font serif dal contenitore */
    #liturgy * {
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Testo principale dei salmi, letture, inni */
    #liturgy p {
      font-size: 17.5px;
      line-height: 1.95;
      margin-bottom: 6px;
      color: var(--text);
    }

    /* Titolo h1 dell'ora (Vespri, Messa, ecc.): già nell'header, lo nascondiamo */
    #liturgy h1 {
      display: none;
    }

    /* h2/h3/h4: titoli di sezione (INNO, SALMO, CANTICO...) */
    #liturgy h2, #liturgy h3, #liturgy h4 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: -apple-system, sans-serif;
      margin: 28px 0 10px;
    }

    /* Separatore orizzontale tra prima e seconda lettura */
    #liturgy hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Citazioni bibliche di riferimento (Es. "Eb 3, 13") */
    #liturgy em {
      color: var(--muted);
      font-style: italic;
      font-size: 15px;
    }

    /* Rubrica liturgica: V. R. Ant.
       Aggiunte via JS dopo il rendering, per colorarle di rosso. */
    #liturgy p.rubric {
      color: var(--rubric);
      font-weight: 600;
      font-size: 14.5px;
      margin-top: 14px;
      margin-bottom: 1px;
    }

    /* Sottotitolo liturgico (es. "VII SETTIMANA DI PASQUA")
       che appare come primo paragrafo visibile dopo h1 */
    #liturgy p.liturgy-subtitle {
      font-size: 10.5px;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
      font-weight: 500;
    }

    /* Intestazione delle sezioni PRIMA / SECONDA LETTURA */
    #liturgy .lettura-section > *:first-child {
      display: block;
      font-size: 10.5px;
      font-family: -apple-system, sans-serif;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--rubric);
      font-weight: 700;
      margin-bottom: 18px;
      /* Usa style serif anche per la label */
      font-style: normal;
    }

    /* ─────────────────────────────────────────────────
       TAB BAR iOS
       Backdrop blur per l'effetto frosted-glass tipico di iOS.
    ───────────────────────────────────────────────── */
    #tab-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: calc(56px + var(--safe-bot));
      padding-bottom: var(--safe-bot);
      background: var(--tab-bg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding-top: 6px;
      border: none;
      background: none;
      color: var(--muted);
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      cursor: pointer;
      /* Rimuove il flash blu al tap su iOS Safari */
      -webkit-tap-highlight-color: transparent;
      transition: color 0.12s ease;
      user-select: none;
    }
    .tab.active {
      color: var(--accent);
    }
    .tab-icon {
      font-size: 22px;
      line-height: 1;
    }
    .tab-label {
      font-size: 10px;
      letter-spacing: 0.1px;
      font-weight: 500;
    }
  </style>
</head>

<body>
<div id="app">

  <header id="header">
    <div id="header-date">—</div>
    <div id="header-title">Liturgia del Giorno</div>
  </header>

  <main id="scroll-area">
    <div id="state-loading">
      <div class="spinner"></div>
      Caricamento testo liturgico…
    </div>
    <div id="state-error"></div>
    <div id="liturgy"></div>
  </main>

  <nav id="tab-bar">
    <button class="tab" data-tab="vespri">
      <span class="tab-icon">🕯️</span>
      <span class="tab-label">Vespri</span>
    </button>
    <button class="tab" data-tab="messa">
      <span class="tab-icon">✝️</span>
      <span class="tab-label">Messa</span>
    </button>
    <button class="tab" data-tab="ufficio">
      <span class="tab-icon">📖</span>
      <span class="tab-label">Letture</span>
    </button>
  </nav>

</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURAZIONE
   ═══════════════════════════════════════════════════════════════

   PROXY_URL: l'URL del proxy CORS da usare.

   Opzione A (immediata, nessun setup):
     corsproxy.io — proxy pubblico gratuito, funziona subito.
     Rate limit: abbondante per uso personale quotidiano.

   Opzione B (consigliata per uso stabile):
     Il tuo Cloudflare Worker (vedi worker.js incluso).
     Una volta deployato, sostituisci la riga PROXY con il tuo URL.

   ═══════════════════════════════════════════════════════════════ */

const PROXY = 'https://corsproxy.io/?url=';
// const PROXY = 'https://IL-TUO-WORKER.workers.dev/?url=';

const CEI_BASE = 'https://www.chiesacattolica.it';

/* ═══════════════════════════════════════════════════════════════
   STATO APPLICAZIONE
   ═══════════════════════════════════════════════════════════════ */
let activeTab = null;
const memCache = {};  // Cache in memoria per la sessione corrente

/* ═══════════════════════════════════════════════════════════════
   UTILITÀ DATA
   ═══════════════════════════════════════════════════════════════

   Usiamo Intl.DateTimeFormat con timeZone 'Europe/Rome' per essere
   certi di usare la data liturgica corretta anche se l'iPhone è
   fisicamente in un altro fuso orario.
   ═══════════════════════════════════════════════════════════════ */
function getDateStr() {
  const parts = new Intl.DateTimeFormat('it-IT', {
    timeZone: 'Europe/Rome',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit'
  }).formatToParts(new Date());
  const v = k => parts.find(p => p.type === k).value;
  return `${v('year')}${v('month')}${v('day')}`;
}

function formatDateLabel(ds) {
  // ds è nel formato YYYYMMDD
  const iso = `${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}T12:00:00`;
  return new Date(iso).toLocaleDateString('it-IT', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
}

/* ═══════════════════════════════════════════════════════════════
   URL BUILDER
   ═══════════════════════════════════════════════════════════════

   Gli URL sono completamente deterministici dalla data.
   Non è necessario fare scraping della homepage per trovare i link.
   Il parametro ?data-liturgia=YYYYMMDD è stabile da anni.
   ═══════════════════════════════════════════════════════════════ */
function buildUrl(tab, ds) {
  switch (tab) {
    case 'messa':
      return `${CEI_BASE}/liturgia-del-giorno/?data-liturgia=${ds}`;
    case 'vespri':
      return `${CEI_BASE}/la-liturgia-delle-ore/?data-liturgia=${ds}&ora=vespri`;
    case 'ufficio':
      return `${CEI_BASE}/la-liturgia-delle-ore/?data-liturgia=${ds}&ora=ufficio-delle-letture`;
  }
}

/* ═══════════════════════════════════════════════════════════════
   FETCH CON CACHE A DUE LIVELLI
   ═══════════════════════════════════════════════════════════════

   1° livello: cache in memoria (velocissima, dura la sessione)
   2° livello: localStorage con chiave {tab}_{YYYYMMDD}

   Le voci di giorni precedenti vengono cancellate automaticamente
   al primo accesso del giorno nuovo, così lo storage non si riempie.
   ═══════════════════════════════════════════════════════════════ */
async function fetchPage(tab, ds) {
  const key = `${tab}_${ds}`;

  // Cache memoria
  if (memCache[key]) return memCache[key];

  // Cache localStorage
  const stored = localStorage.getItem(key);
  if (stored) {
    memCache[key] = stored;
    return stored;
  }

  // Pulizia chiavi di giorni precedenti (mantieni solo oggi)
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const k = localStorage.key(i);
    if (k && !k.endsWith(`_${ds}`)) localStorage.removeItem(k);
  }

  // Fetch reale tramite proxy CORS
  const url = buildUrl(tab, ds);
  const res = await fetch(PROXY + encodeURIComponent(url));
  if (!res.ok) throw new Error(`Risposta HTTP ${res.status} dal server`);

  const html = await res.text();

  // Salva in entrambe le cache
  memCache[key] = html;
  try { localStorage.setItem(key, html); } catch (_) {
    // localStorage pieno o non disponibile: prosegui senza cache persistente
  }

  return html;
}

/* ═══════════════════════════════════════════════════════════════
   TROVA IL CONTENITORE PRINCIPALE
   ═══════════════════════════════════════════════════════════════

   Cascata di selettori CSS dal più specifico al più generico.
   ".entry-content" è la convenzione WordPress standard e quasi
   certamente funzionerà su questo sito.
   ═══════════════════════════════════════════════════════════════ */
function findContentEl(doc) {
  const selectors = [
    '.entry-content',
    'article .content',
    '.post-content',
    'main article',
    'article',
    'main'
  ];
  for (const s of selectors) {
    const el = doc.querySelector(s);
    // Valido solo se contiene testo liturgico significativo (> 300 caratteri)
    if (el && el.textContent.trim().length > 300) return el;
  }
  // Fallback estremo: tutto il body
  return doc.body;
}

/* ═══════════════════════════════════════════════════════════════
   PULIZIA ELEMENTI NON NECESSARI
   ═══════════════════════════════════════════════════════════════

   Rimuoviamo tutti gli elementi che non fanno parte del testo
   liturgico: immagini, social sharing, controllo grandezza testo,
   breadcrumb, link di stampa, ecc.
   ═══════════════════════════════════════════════════════════════ */
function cleanEl(el) {
  // Rimozione per selettore CSS
  const cssToRemove = [
    'img', 'figure', 'picture', 'video', 'iframe',
    'script', 'style', 'noscript',
    'nav', 'header', 'footer', 'aside',
    '[class*="share"]', '[class*="social"]',
    '[class*="grandezza"]', '[class*="font-size"]',
    '.addtoany_share_save_container', '.a2a_kit',
    'a[href*="facebook"]', 'a[href*="twitter"]',
    'a[href*="mailto"]',
    // Link con href="#" usati solo come controlli UI (tasto grandezza testo)
    'a[href="#"]',
    '.breadcrumb', '.breadcrumbs', '.wp-block-buttons'
  ];

  cssToRemove.forEach(s => {
    try { el.querySelectorAll(s).forEach(e => e.remove()); }
    catch (_) {} // Ignora selettori non supportati
  });

  // Rimozione per contenuto testuale (bottoni e label UI)
  const utilityTexts = [
    'Grandezza Testo', 'Condividi', 'Invia', 'Stampa',
    'Facebook', 'Twitter', 'Torna ai risultati',
    'Lettura a schermo intero', 'Chiudi mappa'
  ];

  // Elaboriamo dal fondo dell'array per non invalidare gli indici
  // dopo le rimozioni
  Array.from(el.querySelectorAll('p, div, span, a, li, button'))
    .reverse()
    .forEach(e => {
      const t = e.textContent.trim();
      if (
        utilityTexts.some(u => t === u) ||
        /^A\s+A\s+A$/.test(t) ||  // Controllo grandezza testo "A A A"
        /^Home$/.test(t)
      ) {
        e.remove();
      }
    });
}

/* ═══════════════════════════════════════════════════════════════
   HELPER: trova il figlio diretto del container che contiene
   (o è) l'elemento dato
   ═══════════════════════════════════════════════════════════════ */
function topChild(descendant, container) {
  let curr = descendant;
  while (curr && curr.parentElement !== container) {
    curr = curr.parentElement;
  }
  return (curr && curr.parentElement === container) ? curr : null;
}

/* ═══════════════════════════════════════════════════════════════
   RIMOZIONE SEZIONI ALTERNATIVE (Oppure:)
   ═══════════════════════════════════════════════════════════════

   "Oppure:" introduce un testo alternativo equivalente al
   precedente (tipicamente la versione latina di un inno).
   
   Strategia:
   1. Trova ogni elemento foglia con testo esattamente "Oppure:"
   2. Risali al figlio diretto del container principale
   3. Rimuovi da lì fino all'inizio della sezione successiva
      (riconosciuta da pattern come "1 ant.", "SALMO", ecc.)
   ═══════════════════════════════════════════════════════════════ */
function removeAlternatives(el) {
  // Pattern che segnalano l'inizio di una nuova sezione liturgica
  const nextSectionPat = /^(\d+\s*ant\.|SALMO\b|CANTICO\b|INNO\b|PRIMA\s+LETTURA|SECONDA\s+LETTURA|RESPONSORIO|ORAZIONE\b|V\.\s|R\.\s|ANT\.)/i;

  // Trova tutti gli elementi foglia con testo "Oppure:" (senza figli propri)
  // Li elaboriamo dal fondo per non invalidare i riferimenti al DOM
  const oppureEls = Array.from(el.querySelectorAll('*'))
    .filter(e => {
      const t = e.textContent.trim();
      return (t === 'Oppure:' || t === 'Oppure') && e.children.length === 0;
    })
    .reverse();

  for (const leaf of oppureEls) {
    const top = topChild(leaf, el);
    if (!top) continue;

    // Raccogliamo top + tutti i fratelli successivi fino alla prossima sezione
    const toRemove = [top];
    let sib = top.nextElementSibling;

    while (sib) {
      const t = sib.textContent ? sib.textContent.trim() : '';
      if (nextSectionPat.test(t)) break; // trovata la sezione successiva: ci fermiamo
      toRemove.push(sib);
      sib = sib.nextElementSibling;
    }

    toRemove.forEach(n => n.remove());
  }
}

/* ═══════════════════════════════════════════════════════════════
   ESTRAZIONE PRIMA E SECONDA LETTURA
   ═══════════════════════════════════════════════════════════════

   Per l'Ufficio delle letture recuperiamo SOLO le due letture,
   escludendo inni, salmi, versetti, responsori, Te Deum, ecc.
   
   Algoritmo:
   1. Trova l'elemento foglia con testo breve "PRIMA LETTURA"
   2. Trova l'elemento foglia con testo breve "SECONDA LETTURA"
   3. Risali per ciascuno al figlio diretto del container
   4. Itera i figli del container:
      - Da primaTop → raccoglie in "sezione prima"
      - Da secondaTop → raccoglie in "sezione seconda"
      - Al primo marcatore di fine (TE DEUM, RESPONSORIO...) → stop
   ═══════════════════════════════════════════════════════════════ */
function extractLetture(contentEl) {
  // Trova l'elemento foglia che contiene il testo cercato
  // (senza figli propri, testo breve = è una intestazione di sezione)
  function findLeaf(pattern) {
    return Array.from(contentEl.querySelectorAll('*')).find(e =>
      e.children.length === 0 &&
      e.textContent.trim().length < 80 &&
      pattern.test(e.textContent.trim())
    );
  }

  const primaLeaf  = findLeaf(/PRIMA\s+LETTURA/i);
  const secondaLeaf = findLeaf(/SECONDA\s+LETTURA/i);

  // Se non troviamo i marcatori, restituiamo il contenuto integrale
  // come fallback sicuro (l'utente vede tutto piuttosto che nulla)
  if (!primaLeaf && !secondaLeaf) return contentEl;

  const primaTop  = primaLeaf  ? topChild(primaLeaf,  contentEl) : null;
  const secondaTop = secondaLeaf ? topChild(secondaLeaf, contentEl) : null;

  // Marcatori che segnalano la fine della seconda lettura
  const endPat = /^(TE\s+DEUM|BREVE\s+RESPONSORIO|RESPONSORIO\b|ORAZIONE\b|CONCLUSIONE|LAUDI)/i;

  const result  = document.createElement('div');
  let mode    = null;  // null | 'prima' | 'seconda'
  let section = null;

  for (const child of Array.from(contentEl.childNodes)) {
    // Controlla se questo nodo è (o contiene) il marcatore di sezione
    const isOrContains = (leaf, top) =>
      leaf && top &&
      (child === top || (typeof child.contains === 'function' && child.contains(leaf)));

    if (isOrContains(primaLeaf, primaTop)) {
      mode = 'prima';
      section = document.createElement('div');
      section.className = 'lettura-section';
      result.appendChild(section);
      if (child.nodeType === Node.ELEMENT_NODE)
        section.appendChild(child.cloneNode(true));
      continue;
    }

    if (isOrContains(secondaLeaf, secondaTop)) {
      // Separatore visivo tra le due letture
      result.appendChild(document.createElement('hr'));
      mode = 'seconda';
      section = document.createElement('div');
      section.className = 'lettura-section';
      result.appendChild(section);
      if (child.nodeType === Node.ELEMENT_NODE)
        section.appendChild(child.cloneNode(true));
      continue;
    }

    // Fine della seconda lettura: stop
    if (mode === 'seconda' && child.nodeType === Node.ELEMENT_NODE) {
      const t = child.textContent ? child.textContent.trim() : '';
      if (endPat.test(t)) break;
    }

    // Aggiunge il nodo alla sezione corrente
    if (mode && section) {
      if (child.nodeType === Node.ELEMENT_NODE ||
          (child.nodeType === Node.TEXT_NODE && child.textContent.trim())) {
        section.appendChild(child.cloneNode(true));
      }
    }
  }

  // Se l'estrazione ha prodotto contenuto, lo restituiamo;
  // altrimenti fallback sul contenuto integrale
  return result.childElementCount > 0 ? result : contentEl;
}

/* ═══════════════════════════════════════════════════════════════
   POST-PROCESSING: STILI SEMANTICI
   ═══════════════════════════════════════════════════════════════

   Aggiunge classi CSS basandosi sul testo degli elementi,
   dato che non possiamo fare affidamento sulle classi del sito CEI.
   ═══════════════════════════════════════════════════════════════ */
function applySemanticStyles(container) {
  // Rubrica: paragrafi con solo "V." "R." "Ant." ecc. → colore rosso
  const rubricPat = /^(V\.|R\.|Ant\.|Sal\.|Rit\.)$/;
  container.querySelectorAll('p').forEach(p => {
    if (rubricPat.test(p.textContent.trim())) {
      p.classList.add('rubric');
    }
  });

  // Sottotitolo liturgico: il primo paragrafo breve in MAIUSCOLO
  // che identifica la settimana liturgica
  const firstP = container.querySelector('p:not(.rubric)');
  if (firstP) {
    const t = firstP.textContent.trim();
    if (
      t.length < 120 &&
      (/SETTIMANA/i.test(t) || /SOLENNIT/i.test(t) || /DOMENICA/i.test(t) || /FESTA/i.test(t))
    ) {
      firstP.classList.add('liturgy-subtitle');
    }
  }
}

/* ═══════════════════════════════════════════════════════════════
   PIPELINE DI ESTRAZIONE COMPLETA
   ═══════════════════════════════════════════════════════════════ */
function extractContent(rawHtml, tab) {
  const doc = new DOMParser().parseFromString(rawHtml, 'text/html');

  // 1. Trova il container del contenuto
  const content = findContentEl(doc);

  // 2. Rimuovi elementi non testuali
  cleanEl(content);

  // 3. Rimuovi sezioni alternative (Oppure:) per tutti i tab
  removeAlternatives(content);

  // 4. Per l'Ufficio: estrai solo PRIMA e SECONDA LETTURA
  if (tab === 'ufficio') {
    return extractLetture(content);
  }

  // Per Vespri e Messa: restituisci il contenuto pulito integrale
  return content;
}

/* ═══════════════════════════════════════════════════════════════
   GESTIONE UI
   ═══════════════════════════════════════════════════════════════ */
const elLoading = document.getElementById('state-loading');
const elError   = document.getElementById('state-error');
const elLiturgy = document.getElementById('liturgy');
const elDate    = document.getElementById('header-date');
const elTitle   = document.getElementById('header-title');

function showLoading() {
  elLoading.style.display = '';
  elError.style.display   = 'none';
  elLiturgy.style.display = 'none';
}

function showContent(node) {
  elLoading.style.display = 'none';
  elError.style.display   = 'none';
  elLiturgy.innerHTML     = '';

  if (typeof node === 'string') {
    elLiturgy.innerHTML = node;
  } else {
    elLiturgy.appendChild(node);
  }

  // Applica stili semantici dopo l'inserimento nel DOM
  applySemanticStyles(elLiturgy);

  elLiturgy.style.display = '';

  // Torna in cima alla pagina ad ogni cambio di tab
  document.getElementById('scroll-area').scrollTop = 0;
}

function showError(msg, url) {
  elLoading.style.display = 'none';
  elLiturgy.style.display = 'none';
  elError.innerHTML = `
    <strong>Errore nel caricamento</strong>
    ${msg}
    <br><br>
    <a href="${url}" target="_blank" rel="noopener noreferrer">Apri il sito originale →</a>
  `;
  elError.style.display = '';
}

/* ═══════════════════════════════════════════════════════════════
   TITOLI DEI TAB
   ═══════════════════════════════════════════════════════════════ */
const TAB_TITLES = {
  vespri:  'Vespri',
  messa:   'Messa del Giorno',
  ufficio: "Letture dell'Ufficio"
};

/* ═══════════════════════════════════════════════════════════════
   RENDER PRINCIPALE
   ═══════════════════════════════════════════════════════════════ */
async function renderTab(tab) {
  showLoading();
  elTitle.textContent = TAB_TITLES[tab];

  const ds = getDateStr();
  elDate.textContent = formatDateLabel(ds);

  try {
    const rawHtml = await fetchPage(tab, ds);
    const contentNode = extractContent(rawHtml, tab);
    showContent(contentNode);
  } catch (err) {
    showError(err.message, buildUrl(tab, ds));
  }
}

/* ═══════════════════════════════════════════════════════════════
   NAVIGAZIONE TRA TAB
   ═══════════════════════════════════════════════════════════════ */
function switchTab(tab) {
  if (tab === activeTab) return; // già attivo, nessuna azione
  activeTab = tab;

  document.querySelectorAll('.tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });

  renderTab(tab);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => switchTab(btn.dataset.tab));
});

/* ═══════════════════════════════════════════════════════════════
   AVVIO
   Mostra i Vespri come schermata iniziale predefinita.
   ═══════════════════════════════════════════════════════════════ */
switchTab('vespri');
</script>
